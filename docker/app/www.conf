; =================================================================
; PHP-FPM Pool Config — Ujian Terpadu
; Optimized for 4 core / 4GB RAM / 2000 concurrent users
;
; Memory budget: ~1536 MB for PHP-FPM
; Per worker: ~30 MB average → max 50 workers
; 2000 users × 1 req per 5s = 400 req/s
; 50 workers × (1000ms / 100ms avg) = 500 req/s capacity
; =================================================================

[www]
user = www-data
group = www-data

listen = 9000
listen.backlog = 1024

; --- Process Manager ---
; dynamic = scales workers based on demand (best for variable load)
pm = dynamic
pm.max_children = 50
pm.start_servers = 15
pm.min_spare_servers = 10
pm.max_spare_servers = 30
pm.max_requests = 1000
pm.process_idle_timeout = 10s

; --- Status page (for monitoring) ---
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; --- Timeouts ---
request_terminate_timeout = 60s
request_slowlog_timeout = 5s
slowlog = /proc/self/fd/2

; --- Environment ---
clear_env = no
catch_workers_output = yes
decorate_workers_output = no
