; =================================================================
; PHP Production Config — Ujian Terpadu
; Optimized for horizontal scaling: 3 × 512M app containers
; =================================================================

; --- Memory & Upload ---
memory_limit = 128M
upload_max_filesize = 50M
post_max_size = 55M
max_execution_time = 60
max_input_time = 60
max_input_vars = 5000

; --- OPcache (CRITICAL for performance) ---
; enable_cli=1 is required for Octane (runs as CLI long-lived process)
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.save_comments = 1
opcache.jit = tracing
opcache.jit_buffer_size = 64M

; --- Realpath cache ---
realpath_cache_size = 4096k
realpath_cache_ttl = 600

; --- Session (handled by Redis, minimal PHP config) ---
session.gc_maxlifetime = 7200
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.cookie_secure = 1

; --- Error handling (production) ---
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
error_log = /proc/self/fd/2

; --- Date ---
date.timezone = Asia/Jakarta

; --- Performance ---
expose_php = Off
zlib.output_compression = Off
