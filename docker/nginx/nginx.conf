# =================================================================
# Nginx main config — Ujian Terpadu
# Load Balancer for FrankenPHP app replicas
# Optimized for 4 core / 3000 concurrent users
# Mount to /etc/nginx/nginx.conf
# =================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- Docker DNS resolver (required for dynamic upstream resolution) ---
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time '
                    'urt=$upstream_response_time uaddr=$upstream_addr';
    access_log /var/log/nginx/access.log main buffer=16k flush=5s;

    # --- Performance ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    reset_timedout_connection on;
    types_hash_max_size 2048;
    server_tokens off;

    # --- Connection limits ---
    keepalive_timeout 65;
    keepalive_requests 1000;

    # --- Open file cache ---
    open_file_cache max=10000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    include /etc/nginx/conf.d/*.conf;
}
