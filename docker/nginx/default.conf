# =================================================================
# Nginx Reverse Proxy + Load Balancer — Ujian Terpadu
# Distributes traffic across FrankenPHP app replicas (HTTP mode)
# Uses variable-based proxy_pass for Docker DNS round-robin
# =================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Docker DNS resolver for dynamic upstream resolution
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Backend variable — Nginx re-resolves on each request via Docker DNS
    set $backend "http://app:8000";

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/vnd.ms-fontobject application/x-font-ttf
        image/svg+xml font/opentype font/woff font/woff2;

    # --- Client body ---
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # --- Timeouts ---
    keepalive_timeout 65;
    send_timeout 60;

    # --- Service Worker ---
    location = /sw.js {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # --- PWA Manifest ---
    location = /manifest.json {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    # --- Static assets (aggressive cache) ---
    location ~* \.(css|js|png|jpg|jpeg|webp|svg|gif|ico|woff|woff2|ttf|otf|eot)$ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Health check (for Cloudflare Tunnel & Docker healthcheck) ---
    location = /up {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # --- Nginx status (internal monitoring) ---
    location = /nginx-status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
    }

    # --- All other requests → proxy to app cluster ---
    location / {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts
        proxy_connect_timeout 10;
        proxy_send_timeout 60;
        proxy_read_timeout 300;

        # Buffering
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;

        # WebSocket support (if needed in future)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # --- Deny hidden files ---
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
