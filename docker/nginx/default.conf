# =================================================================
# Nginx Config — Ujian Terpadu
# Optimized for 4 core / 4GB RAM / 2000 concurrent users
# =================================================================

upstream php-fpm {
    server app:9000;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/vnd.ms-fontobject application/x-font-ttf
        image/svg+xml font/opentype font/woff font/woff2;

    # --- Client body ---
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # --- Timeouts ---
    keepalive_timeout 65;
    send_timeout 60;
    proxy_read_timeout 300;

    # --- Service Worker ---
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    # --- PWA Manifest ---
    location = /manifest.json {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # --- Static assets (aggressive cache) ---
    location ~* \.(css|js|png|jpg|jpeg|webp|svg|gif|ico|woff|woff2|ttf|otf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # --- Storage files (soal images) ---
    location /storage {
        alias /var/www/html/storage/app/public;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # --- PHP via FastCGI to php-fpm ---
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Buffering
        fastcgi_buffer_size 128k;
        fastcgi_buffers 8 256k;
        fastcgi_busy_buffers_size 512k;

        # Timeouts
        fastcgi_connect_timeout 10;
        fastcgi_send_timeout 60;
        fastcgi_read_timeout 300;

        # Keepalive to upstream
        fastcgi_keep_conn on;
    }

    # --- Deny hidden files ---
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # --- FPM status (internal only) ---
    location = /fpm-status {
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location = /fpm-ping {
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
