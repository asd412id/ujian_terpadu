; =================================================================
; PHP Config — Horizon (Queue Worker)
; Optimized for long-running CLI workers inside 384MB container
; Reduced OPcache/JIT vs app containers (workers don't need full cache)
; =================================================================

; --- Memory & Limits ---
memory_limit = 128M
max_execution_time = 0
max_input_time = -1
max_input_vars = 5000

; --- OPcache (reduced for CLI workers) ---
; enable_cli=1 required for Horizon (long-lived PHP process)
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 64
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.save_comments = 1

; --- JIT (reduced — workers are I/O bound, not CPU bound) ---
opcache.jit = tracing
opcache.jit_buffer_size = 32M

; --- Realpath cache ---
realpath_cache_size = 4096k
realpath_cache_ttl = 600

; --- Session (not used by Horizon, minimal config) ---
session.gc_maxlifetime = 7200
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.cookie_secure = 1

; --- Error handling (production) ---
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
error_log = /proc/self/fd/2

; --- Date ---
date.timezone = Asia/Jakarta

; --- Performance ---
expose_php = Off
zlib.output_compression = Off
