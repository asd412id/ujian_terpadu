; =================================================================
; PHP Config — Scheduler (Cron)
; Minimal footprint for schedule:work inside 128MB container
; JIT disabled — scheduler runs short commands every minute, no benefit
; =================================================================

; --- Memory & Limits ---
memory_limit = 96M
max_execution_time = 120
max_input_time = 60
max_input_vars = 5000

; --- OPcache (minimal — scheduler runs few scripts) ---
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 32
opcache.interned_strings_buffer = 4
opcache.max_accelerated_files = 5000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.save_comments = 1

; --- JIT disabled (not useful for cron, saves ~64MB) ---
opcache.jit = disable
opcache.jit_buffer_size = 0

; --- Realpath cache ---
realpath_cache_size = 2048k
realpath_cache_ttl = 600

; --- Session (not used by scheduler) ---
session.gc_maxlifetime = 7200
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.cookie_secure = 1

; --- Error handling (production) ---
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
error_log = /proc/self/fd/2

; --- Date ---
date.timezone = Asia/Jakarta

; --- Performance ---
expose_php = Off
zlib.output_compression = Off
