services:
  nginx:
    image: nginx:1.25-alpine
    container_name: ujian_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - ujian_network

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: ujian_app
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-production}
      - OCTANE_SERVER=frankenphp
    volumes:
      - .:/var/www/html
      - ./docker/app/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ujian_network
    deploy:
      resources:
        limits:
          memory: 1536M

  queue:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: ujian_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--max-time=3600", "--queue=imports,default"]
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - ujian_network
    deploy:
      resources:
        limits:
          memory: 256M

  mysql:
    image: mysql:8.0
    container_name: ujian_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-ujian_terpadu}
      MYSQL_USER: ${DB_USERNAME:-ujian_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ujian_secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
      interval: 10s
    networks:
      - ujian_network
    deploy:
      resources:
        limits:
          memory: 1024M

  redis:
    image: redis:7-alpine
    container_name: ujian_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5
      interval: 10s
    networks:
      - ujian_network
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  ujian_network:
    driver: bridge
