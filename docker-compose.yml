# =================================================================
# Docker Compose — Ujian Terpadu (Production)
# Laravel Octane + FrankenPHP + Horizon + Cloudflare Tunnel
# Optimized for 4 core / 4GB RAM / 2000 concurrent users
#
# Memory Budget:
#   app:        1856 MB (Octane 4 workers + Horizon + Scheduler)
#   mysql:       768 MB
#   redis:       256 MB
#   cloudflared:  64 MB
#   ─────────────
#   Total: ~2944 MB (leaves ~1056 MB for OS + Docker overhead)
#
# No ports exposed — all traffic goes through Cloudflare Tunnel.
# =================================================================

services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: ujian_app
    restart: unless-stopped
    env_file: .env
    environment:
      - SERVER_NAME=:8000
    volumes:
      - .env:/app/.env
      - app_storage:/app/storage
      - ./docker/app/php.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
      - ./docker/app/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          cpus: "3.5"
          memory: 1856M
        reservations:
          memory: 512M

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: ujian_tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      app:
        condition: service_healthy
    networks:
      - frontend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
        reservations:
          memory: 32M

  mysql:
    image: mysql:8.0
    container_name: ujian_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-ujian_terpadu}
      MYSQL_USER: ${DB_USERNAME:-ujian_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ujian_secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 768M
        reservations:
          memory: 384M

  redis:
    image: redis:7-alpine
    container_name: ujian_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 192mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 60
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local

networks:
  frontend:
    driver: bridge
    internal: false
  backend:
    driver: bridge
    internal: true
