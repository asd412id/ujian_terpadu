# =================================================================
# Docker Compose — Ujian Terpadu (Production)
# Optimized for 4 core / 4GB RAM / 2000 concurrent users
#
# Memory Budget:
#   nginx:   64 MB
#   app:   1792 MB (php-fpm 50 workers + 2 queue workers via supervisord)
#   mysql:  768 MB
#   redis:  256 MB
#   ─────────────
#   Total: 2880 MB (leaves ~1200 MB for OS + Docker overhead + spikes)
# =================================================================

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: ujian_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    volumes:
      - .:/var/www/html:ro
      - ./storage/app/public:/var/www/html/storage/app/public:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - ujian_network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
        reservations:
          memory: 32M

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: ujian_app
    restart: unless-stopped
    command: ["supervisord", "-c", "/etc/supervisor/conf.d/supervisord.conf"]
    environment:
      - APP_ENV=${APP_ENV:-production}
    volumes:
      - .:/var/www/html
      - ./docker/app/php.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
      - ./docker/app/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      - ./docker/app/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ujian_network
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 1792M
        reservations:
          memory: 512M

  mysql:
    image: mysql:8.0
    container_name: ujian_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-ujian_terpadu}
      MYSQL_USER: ${DB_USERNAME:-ujian_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ujian_secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ujian_network
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 768M
        reservations:
          memory: 384M

  redis:
    image: redis:7-alpine
    container_name: ujian_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 192mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 60
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ujian_network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  ujian_network:
    driver: bridge
