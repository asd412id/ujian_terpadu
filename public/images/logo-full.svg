<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="clip" x1="148" y1="72" x2="364" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Clipboard body -->
  <rect x="128" y="100" width="256" height="320" rx="20" fill="url(#clip)"/>
  <!-- Clipboard top clip -->
  <rect x="200" y="72" width="112" height="56" rx="12" fill="#1e40af"/>
  <rect x="216" y="84" width="80" height="32" rx="8" fill="#60a5fa"/>
  <!-- Check line 1 -->
  <rect x="180" y="180" width="160" height="12" rx="6" fill="#cbd5e1"/>
  <path d="M158 186l8 8 16-16" stroke="#22c55e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Check line 2 -->
  <rect x="180" y="232" width="140" height="12" rx="6" fill="#cbd5e1"/>
  <path d="M158 238l8 8 16-16" stroke="#22c55e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Check line 3 -->
  <rect x="180" y="284" width="152" height="12" rx="6" fill="#cbd5e1"/>
  <path d="M158 290l8 8 16-16" stroke="#22c55e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pencil line 4 (in progress) -->
  <rect x="180" y="336" width="100" height="12" rx="6" fill="#e2e8f0"/>
  <circle cx="158" cy="342" r="10" fill="#f59e0b" opacity="0.8"/>
  <!-- Decorative pencil -->
  <g transform="translate(340, 360) rotate(-45)">
    <rect x="0" y="0" width="14" height="80" rx="2" fill="#f59e0b"/>
    <rect x="0" y="0" width="14" height="16" rx="2" fill="#fbbf24"/>
    <polygon points="3,80 11,80 7,96" fill="#374151"/>
  </g>
</svg>
